<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Open Remote Control</title>
    <meta name="description" content="Drive a locally-running Claude Code from a browser — including a phone." />
    <meta name="theme-color" content="#f97316" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#16181d" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark" />
    <!-- App-like viewport: pinch zoom is intentionally disabled — the
         transcript is a control surface, not a document, and accidental
         zoom on mobile made panes drift. Wide content scrolls inside
         its own block instead (pre/table overflow-x). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!-- PWA install + home-screen integration. The manifest is the
         source of truth on Chromium/Firefox; the apple-* meta tags
         cover Safari (iOS Safari 16.4+ Web Push requires the page
         to be home-screen-installed). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="mask-icon" href="/icon.svg" color="#f97316" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ORC" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
