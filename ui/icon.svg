<?xml version="1.0" encoding="UTF-8"?>
<!--
  ORC brand mark — refined geometry (2026-07-03).
  A bold amber "O" ring (the orchestrator) sits centred on a dark
  canvas; one cream node floats at the upper-right, tethered by a
  hairline. Reads as "your remote client, driving the orchestrator".
  The whole mark sits inside the maskable inner 80% safe zone, so
  adaptive launcher shapes (circle, squircle, teardrop) never clip
  the geometry. No rasterised imagery; one source of truth.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="ORC">
  <defs>
    <radialGradient id="bg-fill" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#1f232c"/>
      <stop offset="65%" stop-color="#11141a"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </radialGradient>
    <radialGradient id="ring-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#f97316" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring-stroke" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <radialGradient id="node-fill" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#f5e6d3"/>
    </radialGradient>
    <radialGradient id="ring-inner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark rounded canvas (iOS-friendly rx ~ 23%) -->
  <rect x="0" y="0" width="512" height="512" rx="118" ry="118" fill="url(#bg-fill)"/>

  <!-- Ambient amber glow behind the ring -->
  <circle cx="256" cy="262" r="195" fill="url(#ring-glow)"/>

  <!-- The "O": a single, confident ring. Outer extent 138 + 18 = 156 px
       from centre, well inside the maskable safe zone
       (radius 0.4 x 512 ~ 205 from centre). -->
  <circle cx="256" cy="256" r="138" fill="none" stroke="url(#ring-stroke)" stroke-width="36"/>

  <!-- Inner echo: a barely-there amber wash inside the ring, so the
       hole reads as warm rather than as a black gap. -->
  <circle cx="256" cy="256" r="118" fill="url(#ring-inner)"/>

  <!-- Tethered remote node: a cream disk at the upper-right, drawn
       with a 3-stop radial gradient so it reads as a small sphere.
       The tether connects the ring's outer edge to the node's nearest
       edge at 55% opacity, suggesting an ambient connection. -->
  <line x1="338" y1="174" x2="364" y2="146" stroke="#f5e6d3" stroke-opacity="0.55" stroke-width="7" stroke-linecap="round"/>
  <circle cx="370" cy="142" r="28" fill="url(#node-fill)"/>

  <!-- A tiny rim highlight on the upper-left of the node, selling the
       spherical illusion without overworking the mark. -->
  <circle cx="361" cy="133" r="6" fill="#ffffff" fill-opacity="0.55"/>
</svg>
